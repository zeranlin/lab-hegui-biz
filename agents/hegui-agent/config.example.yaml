agent:
  name: hegui-agent
  mode: python-direct-chat-runner
  wiki_home: /path/to/lab-hegui-llm

model:
  # 真实配置放在 config/config.toml 和 config/auth.json。
  provider: openai-compatible
  model: gpt-5.5
  base_url: https://example.com/v1
  api_key_env: OPENAI_API_KEY

review:
  require_run_record: true
  forbid_external_annotations: true
  forbid_raw_source_edits: true
  forbid_wiki_edits: true
  forbid_wiki_maintenance_commands: true

paths:
  raw_root: raw/招标文件
  output_root: outputs
